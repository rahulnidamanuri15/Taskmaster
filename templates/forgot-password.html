<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Taskmaster</title>

  <!-- Fonts: Playfair Display for headings, Inter for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind via Play CDN (no build step). Custom theme tokens below. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            beige: '#F6F3ED',
            sidebar: '#F1ECE3',
            border: '#D8D1C7',
            ink: '#1F1F1F',
            muted: '#7A746D',
            prioHigh: '#A9332A',
            prioMed: '#C17B21',
            prioLow: '#2E7D32',
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="/static/css/styles.css" />
  <style>
    /* Custom styles for auth pages */
    .logo-square {
      width: 2.5rem;
      height: 2.5rem;
      background-color: #1A1816;
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 0.75rem;
    }

    .logo-letter {
      color: white;
      font-weight: bold;
      font-size: 1.5rem;
    }

    .auth-container {
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .input-group {
      position: relative;
    }

    .input-icon {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: #7A746D;
      cursor: pointer;
    }

    .input-icon:hover {
      color: #1F1F1F;
    }
  </style>
</head>
<body class="bg-beige font-sans text-ink antialiased min-h-screen flex items-center justify-center">
  <div class="auth-container">
    <!-- Logo and Title -->
    <div class="flex items-center mb-6">
      <div class="logo-square">
        <span class="logo-letter">T</span>
      </div>
      <span class="text-2xl font-display font-semibold">TaskMaster</span>
    </div>

    <!-- Title -->
    <h1 class="text-2xl font-display font-semibold mb-6 text-center">Forgot Password</h1>

    <!-- Form Message -->
    <p id="form-message" class="mb-6 text-center text-muted">
      Enter your email address to receive a verification code.
    </p>

    <!-- Forgot Password Form -->
    <form id="forgot-password-form" class="space-y-6">
      <!-- Email Input -->
      <div class="space-y-2">
        <label for="email" class="block text-sm font-medium text-muted">Email Address</label>
        <div class="input-group">
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="Enter your email"
            class="w-full px-4 py-3 border border-border rounded-lg bg-white text-sm focus:outline-none focus:ring-2 focus:ring-ink/30"
          />
        </div>
        <p id="email-error" class="text-sm text-red-500 hidden"></p>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        id="submit-button"
        class="w-full bg-ink text-white px-4 py-3 rounded-lg font-medium hover:bg-ink/85 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        Send Verification Code
      </button>
    </form>

    <!-- Back to Login -->
    <div class="mt-8 text-center text-sm">
      <p class="text-muted">
        Remember your password? <a href="/login" class="text-ink font-medium hover:text-ink/80 transition-colors">Sign in</a>
      </p>
    </div>

    <!-- Footer -->
    <div class="mt-12 text-center text-xs text-muted">© 2026 TaskMaster. All rights reserved.</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.getElementById('forgot-password-form');
      const submitButton = document.getElementById('submit-button');
      const emailError = document.getElementById('email-error');
      const formMessage = document.getElementById('form-message');

      form.addEventListener('submit', function(e) {
        e.preventDefault();

        // Get form data
        const email = document.getElementById('email').value.trim();

        // Reset errors
        emailError.textContent = '';
        emailError.classList.add('hidden');

        // Simple client-side validation
        let isValid = true;

        if (!email) {
          emailError.textContent = 'Email is required';
          emailError.classList.remove('hidden');
          isValid = false;
        } else if (!/^\S+@\S+\.\S+$/.test(email)) {
          emailError.textContent = 'Invalid email address';
          emailError.classList.remove('hidden');
          isValid = false;
        }

        if (!isValid) {
          return;
        }

        // Show loading state
        const originalText = submitButton.innerHTML;
        submitButton.innerHTML = 'Sending Code...';
        submitButton.disabled = true;

        // Prepare data for API
        const forgotPasswordData = {
          email: email
        };

        // Send request to backend
        fetch('/api/v1/auth/forgot-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          credentials: 'include',
          body: JSON.stringify(forgotPasswordData)
        })
        .then(response => {
          if (!response.ok) {
            return response.json().then(err => { throw err; });
          }
          return response.json();
        })
        .then(data => {
          // Store email for verification step
          localStorage.setItem('forgotPasswordEmail', email);

          // Show success message
          formMessage.textContent = data.message;
          formMessage.classList.remove('text-muted');
          formMessage.classList.add('text-green-600');

          // Hide form and show success message
          form.reset();
          form.style.display = 'none';

          // Add a link to go to verification
          const verifyLink = document.createElement('p');
          verifyLink.innerHTML = '<a href="/verify-code.html" class="text-ink font-medium hover:text-ink/80 transition-colors">Continue to Verification</a>';
          verifyLink.className = 'mt-6 text-center text-sm';
          formMessage.parentNode.insertBefore(verifyLink, formMessage.nextSibling);
        })
        .catch(error => {
          console.error('Forgot password error:', error);

          // Show error message
          if (error.detail) {
            emailError.textContent = error.detail;
            emailError.classList.remove('hidden');
          } else {
            alert('An error occurred. Please try again.');
          }

          // Reset button state
          submitButton.innerHTML = originalText;
          submitButton.disabled = false;
        })
        .finally(() => {
          // Ensure button is reset
          submitButton.innerHTML = originalText;
          submitButton.disabled = false;
        });
      });
    });
  </script>
</body>
</html>
